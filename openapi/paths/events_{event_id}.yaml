get:
  tags:
    - Events
  summary: Get event
  description: >
    Get an individual event by ID.
  operationId: getEvent
  parameters:
    - in: path
      name: event_id
      schema:
        type: string
        description: The ID of the event
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [success]
              data:
                $ref: "../components/schemas/Event.yaml"
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [fail]
              data:
                type: array
                items:
                  type: object
                  properties:
                    message:
                      type: string
                      example: You do not have access to this event
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [fail]
              data:
                type: array
                items:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Event not found
patch:
  tags:
    - Events
  summary: Update event
  description: >
    Update an individual event by ID.
  operationId: updateEvent
  parameters:
    - in: path
      name: event_id
      schema:
        type: string
        description: The ID of the event
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - event
          properties:
            event:
              $ref: "../components/schemas/UpdateEventInput.yaml"
        examples:
          update_event:
            summary: Update event timing and guest count
            value:
              event:
                start_time: "2026-08-15T19:00:00Z"
                end_time: "2026-08-16T00:00:00Z"
                group_size: 140
                amount: 175000
  responses:
    '200':
      description: Success
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [success]
              data:
                $ref: "../components/schemas/Event.yaml"
    '400':
      description: Bad Request
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [fail]
              data:
                type: array
                items:
                  type: object
                  properties:
                    message:
                      type: string
                      example: End time must be after start time
    '403':
      description: Forbidden
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [fail]
              data:
                type: array
                items:
                  type: object
                  properties:
                    message:
                      type: string
                      example: You do not have access to this event
    '404':
      description: Not Found
      content:
        application/json:
          schema:
            type: object
            properties:
              status:
                type: string
                enum: [fail]
              data:
                type: array
                items:
                  type: object
                  properties:
                    message:
                      type: string
                      example: Event not found
