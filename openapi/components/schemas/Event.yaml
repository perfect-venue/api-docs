type: object
required:
  - id
  - venue_id
  - contact_id
  - name
  - start_date
  - end_date
  - status
  - created_at
  - updated_at
properties:
  id:
    type: string
    description: The ID of the event
    example: dfa4b137-1b3e-4927-a3d8-0e0e5bd601e3
  venue_id:
    $ref: "./VenueId.yaml"
  contact_id:
    $ref: "./ContactId.yaml"
  name:
    $ref: "./EventName.yaml"
  status:
    type: string
    description: The current status of the event
    enum: [lead, qualified, proposal_sent, confirmed, balance_due, completed, lost]
    example: confirmed
  start_date:
    $ref: "./EventStartDate.yaml"
    deprecated: true
  end_date:
    $ref: "./EventEndDate.yaml"
    deprecated: true
  start_time:
    $ref: "./EventStartTime.yaml"
  end_time:
    $ref: "./EventEndTime.yaml"
  group_size:
    $ref: "./EventGroupSize.yaml"
  source:
    $ref: "./EventSource.yaml"
  campaign:
    $ref: "./EventCampaign.yaml"
  amount:
    $ref: "./EventAmount.yaml"
  event_type:
    $ref: "./EventType.yaml"
  spaces:
    $ref: "./EventSpaces.yaml"
  created_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp when the event was created
    example: "2026-01-15T09:00:00Z"
  updated_at:
    type: string
    format: date-time
    description: ISO 8601 timestamp when the event was last updated
    example: "2026-06-01T14:30:00Z"
