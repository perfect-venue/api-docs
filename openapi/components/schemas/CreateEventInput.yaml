type: object
required:
  - venue_id
  - name
  - start_date
  - end_date
properties:
  venue_id:
    $ref: "./VenueId.yaml"
  contact_id:
    $ref: "./ContactId.yaml"
  name:
    $ref: "./EventName.yaml"
  start_date:
    $ref: "./EventStartDate.yaml"
    deprecated: true
  end_date:
    $ref: "./EventEndDate.yaml"
    deprecated: true
  start_time:
    $ref: "./EventStartTime.yaml"
  end_time:
    $ref: "./EventEndTime.yaml"
  group_size:
    $ref: "./EventGroupSize.yaml"
  source:
    $ref: "./EventSource.yaml"
  campaign:
    $ref: "./EventCampaign.yaml"
  amount:
    $ref: "./EventAmount.yaml"
  event_type:
    $ref: "./EventType.yaml"
  spaces:
    $ref: "./EventSpaces.yaml"
  custom:
    type: object
    description: Custom field values for the event, keyed by custom field key
    additionalProperties:
      type: string
    example: {"dietary_restrictions": "vegan", "ceremony_style": "outdoor"}
