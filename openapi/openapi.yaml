  - name: Webhooks
    description: |
      Perfect Venue can notify your application in real time when data changes for venues available
      to the authorizing Perfect Venue user. Use webhooks for incremental updates, and use the REST API to
      fetch the current resource state whenever you need to reconcile.

      **Quick start**

      Use this flow when adding webhook support:

      1. Build an HTTPS endpoint that can receive `POST` requests from Perfect Venue.
      2. Send Perfect Venue your endpoint URL and the event types your integration needs.
      3. Perfect Venue will add the webhook endpoint and event subscriptions to your OAuth application.
      4. Store the endpoint signing secret provided during setup.
      5. Verify the `PV-Signature` header on every delivery.
      6. Use `PV-Webhook-Id` as your idempotency key.
      7. Return a `2xx` response only after you have safely accepted the delivery.
      8. Fetch the latest resource from the REST API when your local copy needs reconciliation.

      **Subscribing to events**

      Webhook subscriptions are configured by Perfect Venue during integration setup. To subscribe,
      send eng@perfectvenue.com:

      | Field | Description |
      | --- | --- |
      | Endpoint URL | The HTTPS URL where Perfect Venue should send webhook deliveries |
      | Event types | One or more public event type names from the table below |
      | OAuth application | The OAuth application Perfect Venue configured for your integration |

      Example setup request:

      ```text
      Endpoint URL: https://example.com/perfect-venue/webhooks
      Event types: event.created, event.status_changed, event.deleted, contact.created
      OAuth application: Partner Integration Name
      ```

      Perfect Venue configures webhook subscriptions on your OAuth application. Your endpoint can
      subscribe to multiple event types.

      Your endpoint must be reachable over HTTPS and should be prepared to receive duplicate
      deliveries.

      Your endpoint receives events only for venues available to users who have authorized your OAuth application.

      **Delivery request**

      Each delivery is an HTTPS `POST` to your configured endpoint.

      Required headers:

      | Header | Description |
      | --- | --- |
      | `Content-Type` | Always `application/json` |
      | `PV-Webhook-Id` | Stable delivery ID. Use this to deduplicate retries. |
      | `PV-Signature` | Timestamped HMAC signature used to verify the request. |

      Example delivery:

      ```http
      POST /perfect-venue/webhooks HTTP/1.1
      Content-Type: application/json
      PV-Webhook-Id: f8c1a0e2-6d2f-4a0d-99a2-1fd6f9f3c1aa
      PV-Signature: t=1718557200,v1=5257a869e7ecebeda32affa62cdca3fa...
      ```

      **Payload envelope**

      The JSON body always follows this envelope:

      ```json
      {
        "id": "f8c1a0e2-6d2f-4a0d-99a2-1fd6f9f3c1aa",
        "type": "event.created",
        "api_version": "2026-06-01",
        "created_at": "2026-06-16T17:00:00Z",
        "data": {
          "id": "dfa4b137-1b3e-4927-a3d8-0e0e5bd601e3",
          "venue_id": "VENUE_ID",
          "contact_id": "CONTACT_ID",
          "name": "Henry's Wedding",
          "status": "lead",
          "start_time": "2026-08-15T18:00:00Z",
          "end_time": "2026-08-15T23:00:00Z",
          "event_type": "Wedding",
          "spaces": ["main-hall"],
          "created_at": "2026-06-16T17:00:00Z",
          "updated_at": "2026-06-16T17:00:00Z"
        }
      }
      ```

      The `data` object contains the payload for the specific event type.

      **Event types**

      | Type | Fires when |
      | --- | --- |
      | `event.created` | An event (booking or lead) is created |
      | `event.status_changed` | An event's status changes; payload includes the previous status |
      | `event.deleted` | An event is deleted (soft deleted) |
      | `contact.created` | A new inbound inquiry arrives |

      **Payloads**

      **`event.created` and `event.deleted`**

      The `data` payload is the Event object — the same shape returned by
      [Get Event](#tag/Events/operation/getEvent) and [List Events](#tag/Events/operation/listEvents).

      Example `event.created` payload:

      ```json
      {
        "id": "f8c1a0e2-6d2f-4a0d-99a2-1fd6f9f3c1aa",
        "type": "event.created",
        "api_version": "2026-06-01",
        "created_at": "2026-06-16T17:00:00Z",
        "data": {
          "id": "dfa4b137-1b3e-4927-a3d8-0e0e5bd601e3",
          "venue_id": "VENUE_ID",
          "contact_id": "CONTACT_ID",
          "name": "Henry's Wedding",
          "status": "lead",
          "start_time": "2026-08-15T18:00:00Z",
          "end_time": "2026-08-15T23:00:00Z",
          "group_size": 120,
          "source": "Partner Integration",
          "campaign": "Summer 2026",
          "amount": 150000,
          "event_type": "Wedding",
          "spaces": ["main-hall"],
          "created_at": "2026-06-16T17:00:00Z",
          "updated_at": "2026-06-16T17:00:00Z"
        }
      }
      ```

      Example `event.deleted` payload:

      ```json
      {
        "id": "9be6ab48-55f2-46f3-bd07-74af424c0f03",
        "type": "event.deleted",
        "api_version": "2026-06-01",
        "created_at": "2026-06-17T15:30:00Z",
        "data": {
          "id": "dfa4b137-1b3e-4927-a3d8-0e0e5bd601e3",
          "venue_id": "VENUE_ID",
          "contact_id": "CONTACT_ID",
          "name": "Henry's Wedding",
          "status": "lost",
          "start_time": "2026-08-15T18:00:00Z",
          "end_time": "2026-08-15T23:00:00Z",
          "event_type": "Wedding",
          "spaces": ["main-hall"],
          "created_at": "2026-06-16T17:00:00Z",
          "updated_at": "2026-06-17T15:30:00Z"
        }
      }
      ```

      **`contact.created`**

      The `data` payload is the Contact object — the same shape returned by
      [Get Contact](#tag/Contacts/operation/getContact).

      Only inbound inquiries emit this event.

      Example `contact.created` payload:

      ```json
      {
        "id": "7f6adfe6-9e01-4644-b850-3877b56526c8",
        "type": "contact.created",
        "api_version": "2026-06-01",
        "created_at": "2026-06-16T17:00:00Z",
        "data": {
          "id": "CONTACT_ID",
          "venue_id": "VENUE_ID",
          "first_name": "Ada",
          "last_name": "Lovelace",
          "email": "ada@example.com",
          "phone": "+14155550100"
        }
      }
      ```

      **`event.status_changed`**

      A thin payload carrying only what changed. Use the `id` to fetch the full event from the
      REST API if you need other fields.

      | Field | Type | Description |
      | --- | --- | --- |
      | `id` | string | Event ID |
      | `venue_id` | string | Venue ID |
      | `status` | string | New status |
      | `previous_status` | string\|null | Status before the change |
      | `updated_at` | string | ISO 8601 timestamp of the change |

      Example:

      ```json
      {
        "id": "f8c1a0e2-6d2f-4a0d-99a2-1fd6f9f3c1aa",
        "type": "event.status_changed",
        "api_version": "2026-06-01",
        "created_at": "2026-06-16T17:00:00Z",
        "data": {
          "id": "dfa4b137-1b3e-4927-a3d8-0e0e5bd601e3",
          "venue_id": "VENUE_ID",
          "status": "confirmed",
          "previous_status": "proposal_sent",
          "updated_at": "2026-06-16T17:00:00Z"
        }
      }
      ```

      **Signature verification**

      Every delivery includes a `PV-Signature` header:

      ```
      PV-Signature: t=1718557200,v1=5257a869e7ecebeda32affa62cdca3fa...
      ```

      `t` is the Unix timestamp the request was signed. `v1` is the HMAC-SHA256 hex digest of
      `"#{msg_id}.#{t}.#{raw_body}"` where `msg_id` is the value of the `PV-Webhook-Id` header,
      computed with your endpoint's signing secret.

      Verification steps:

      1. Read the raw request body before parsing JSON.
      2. Parse `t` and `v1` from `PV-Signature`.
      3. Reject requests where `t` is too far from the current time. We recommend a 5-minute tolerance.
      4. Build the signed payload as `PV-Webhook-Id + "." + t + "." + raw_body`.
      5. Compute the HMAC-SHA256 hex digest with your endpoint signing secret.
      6. Compare the computed digest to `v1` using a constant-time comparison.

      Including `PV-Webhook-Id` in the signed content means a replay attack with a swapped webhook ID
      will fail verification.

      Example Node.js verifier:

      ```javascript
      const crypto = require("crypto");

      function verifyPerfectVenueWebhook({ rawBody, webhookId, signatureHeader, signingSecret }) {
        const parts = Object.fromEntries(
          signatureHeader.split(",").map((part) => part.split("="))
        );
        const timestamp = parts.t;
        const expected = parts.v1;

        const signedPayload = `${webhookId}.${timestamp}.${rawBody}`;
        const actual = crypto
          .createHmac("sha256", signingSecret)
          .update(signedPayload)
          .digest("hex");

        return crypto.timingSafeEqual(
          Buffer.from(actual, "hex"),
          Buffer.from(expected, "hex")
        );
      }
      ```

      **Idempotency**

      The `PV-Webhook-Id` header (and the `id` field in the body) is a stable identifier for an
      event delivery. It does not change across retries. Use it to deduplicate: if you have already
      processed an `id`, acknowledge with 2xx and ignore the repeat.

      Delivery is at-least-once. Your handler must be safe to run twice for the same `PV-Webhook-Id`.

      **Response handling**

      Return a `2xx` status after your endpoint has accepted the delivery. Any non-2xx response,
      timeout, or connection error is treated as a failed delivery and retried.

      Recommended handler behavior:

      1. Verify the signature.
      2. Check whether `PV-Webhook-Id` has already been processed.
      3. Persist the delivery or enqueue work in your system.
      4. Return `2xx`.
      5. Process the event asynchronously when possible.

      **Ordering and sync**

      There is no global ordering guarantee. Deliveries are dispatched concurrently and can arrive
      out of order. Events about the same resource carry a `created_at` you can order by, and you
      can always read the current state from the REST API to reconcile. For high-confidence syncs,
      combine webhooks with periodic `GET /events` backfills filtered by `updated_at`.

      **Retries and endpoint health**

      Failed deliveries are retried automatically.

      If an endpoint fails repeatedly, it may be disabled until it is healthy again.

  - name: Changelog
    description: |
      ## 1.3.0 — 2026-06-18

      ### Webhooks

      **New [Webhooks](#tag/Webhooks) section**

      Outgoing webhooks are now available. Register an HTTPS endpoint on your OAuth application
      and subscribe to the event types you care about. Perfect Venue will POST a signed JSON
      payload to your endpoint whenever a subscribed event occurs.

      Event types available in this release:

      | Type | Fires when |
      | --- | --- |
      | `event.created` | An event is created |
      | `event.status_changed` | An event's status changes |
      | `event.deleted` | An event is deleted |
      | `contact.created` | A new inbound inquiry arrives |

      See the [Webhooks](#tag/Webhooks) section for the full delivery contract, payload schemas,
      signature verification, and retry behavior.

      ### Events

      **New [List Events](#tag/Events/operation/listEvents) endpoint**

      `GET /events` is now available. Returns a paginated list of events for a venue with support for filtering
      by status, event type, source, spaces, contact, and date range.

      | Parameter | Type | Description |
      |---|---|---|
      | `venue_id` | string | **Required.** The ID of the venue |
      | `status` | string[] | Filter by status: `lead`, `qualified`, `proposal_sent`, `confirmed`, `balance_due`, `completed`, `lost` |
      | `event_type` | string[] | Filter by event type name |
      | `source` | string[] | Filter by event source |
      | `spaces` | string[] | Filter by space slug |
      | `contact_id` | string | Filter by contact ID |
      | `order` | string | Sort field: `created_at` (default), `updated_at`, `start_time`, `name` |
      | `sort_direction` | string | `asc` or `desc` (default) |
      | `date_from` | string | ISO 8601 start of date range (requires `date_to`) |
      | `date_to` | string | ISO 8601 end of date range (requires `date_from`) |
      | `date_field` | string | Date field for range filter: `created_at` (default), `updated_at`, `start_time` |
      | `page` | integer | Page number (default: 1) |
      | `per_page` | integer | Results per page, max 100 (default: 25) |

      ## 1.2.0 — 2026-04-01

      ### Venues

      **New fields on [Get Venue](#tag/Venues/operation/getVenue) and [List Venues](#tag/Venues/operation/listVenues)**

      | Field | Type | Description |
      |---|---|---|
      | `event_types` | object[] | Event types configured for the venue, each with a `name` |
      | `spaces` | object[] | Spaces available at the venue, each with `slug`, `name`, `standing`, and `seated` capacity |
      | `custom_fields` | object[] | Custom fields configured for the venue, each with `key`, `name`, `data_type`, and optional `options` |

      ### Events

      **New fields on [Create Event](#tag/Events/operation/createEvent) and [Update Event](#tag/Events/operation/updateEvent)**

      The following optional fields are now supported:

      | Field | Type | Description |
      |---|---|---|
      | `amount` | integer | Estimated event value in cents (e.g. `150000` for $1,500.00) |
      | `event_type` | string | Event type name, must match a type configured for the venue |
      | `spaces` | string[] | Space slugs to assign to the event |
      | `custom` | object | Custom field values keyed by field key |

      **Inline contact creation on [Create Event](#tag/Events/operation/createEvent)**

      You can now create a contact inline when creating an event by passing a top-level `contact` object
      instead of a `contact_id`. If a contact with the given email already exists in your organization, it
      will be reused.

      **Initial message on [Create Event](#tag/Events/operation/createEvent)**

      You can now include an initial message from the contact to the venue when creating an event by passing
      a top-level `message` object with a `text` field.

      **New [Update Event](#tag/Events/operation/updateEvent) endpoint**

      `PATCH /events/{event_id}` is now available. All fields are optional — only the fields you include
      will be updated.

