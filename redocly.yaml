apis:
  sample@v1: 
    root: openapi/openapi.yaml
extends:
  - recommended
rules:
  no-unused-components: error
  no-server-example.com: off
theme:
  openapi:
    htmlTemplate: ./docs/index.html
    disableSearch: true
    theme:
      colors:
        primary:
          main: "#32329f"
        text:
          primary: "#141414"
        border:
          dark: "#e3e8ee"
        http:
          get: "#10b981"
          post: "#0056b3"
          put: "#f59e0b"
          delete: "#ef4444"
      spacing:
        unit: 5
        sectionHorizontal: 40
        sectionVertical: 30
      logo:
        gutter: '20px'
      typography:
        fontSize: '15px'
        lineHeight: '1.7'
        fontFamily: 'Circular, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'
        headings:
          fontFamily: 'Circular, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif'
          fontWeight: '600'
        code:
          fontSize: '13px'
          fontFamily: 'Consolas, Monaco, Courier New, monospace'
        links:
          color: "#32329f"
          hover: "#0056b3"
      rightPanel:
        width: "40%"
      sidebar:
        backgroundColor: "#fafafa"
        textColor: "#141414"
        width: 260px
        groupItems:
          textTransform: uppercase
      schema:
        nestedBackground: "#fafafa"
        labelsTextSize: '0.9em'
      links:
        color: "#32329f"
      fab:
        backgroundColor: "#32329f"
        color: "#ffffff"
      
