<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>API Reference | ReDoc</title>
  <!-- needed for adaptive design -->
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Google Fonts matching perfectvenue.com -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400;1,700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!--
    ReDoc uses font options from the parent element
    So override default browser styles
    -->
  <style>
    body {
      margin: 0;
      padding: 0;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Make section headers more prominent with underlines */
    h1 {
      padding-bottom: 12px !important;
      border-bottom: 2px solid #32329f !important;
      margin-bottom: 24px !important;
      margin-top: 40px !important;
    }

    /* First h1 shouldn't have top margin */
    h1:first-of-type {
      margin-top: 0 !important;
    }

    /* H2 subsections get a lighter underline */
    h2 {
      padding-bottom: 8px !important;
      border-bottom: 1px solid #e3e8ee !important;
      margin-bottom: 16px !important;
      margin-top: 32px !important;
    }
  </style>
  {{{redocHead}}}
</head>

<body>
  {{{redocHTML}}}
</body>

</html>
